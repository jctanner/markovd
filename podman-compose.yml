version: "3"
services:
  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_USER: markovd
      POSTGRES_PASSWORD: markovd
      POSTGRES_DB: markovd
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U markovd"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8082:8080"
    environment:
      MARKOVD_PORT: "8080"
      MARKOVD_DB_URL: "postgres://markovd:markovd@postgres:5432/markovd?sslmode=disable"
      MARKOVD_JWT_SECRET: "dev-secret-change-me"
      MARKOVD_CALLBACK_TOKEN: "dev-callback-token"
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    image: docker.io/library/node:22-bookworm-slim
    working_dir: /ui
    volumes:
      - ./ui:/ui
    ports:
      - "5173:5173"
    command: ["sh", "-c", "npm install && npx vite --host 0.0.0.0"]
    environment:
      VITE_API_PROXY: "http://api:8080"
    depends_on:
      - api

volumes:
  pgdata:
